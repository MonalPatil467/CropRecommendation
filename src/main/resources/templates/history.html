<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendation History</title>

    <link rel="stylesheet" href="/css/history.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>🌱 Smart Crop AI</h2>

        <ul>
            <li><a href="/dashboard">🏠 Dashboard</a></li>
            <li><a href="/recommendation">🌾 New Recommendation</a></li>
            <li><a href="/history">📜 History</a></li>
            <li><a href="#" onclick="logout()">🚪 Logout</a></li>
        </ul>

    </div>

    <!-- Main Content -->
    <div class="main-content">

        <div class="header-card">
            <h1>📜 Recommendation History</h1>
            <p>View all your previous crop recommendations.</p>
        </div>

        <div class="history-table">

            <table>

                <thead>

                <tr>
                    <th>ID</th>
                    <th>Soil Type</th>
                    <th>Temperature</th>
                    <th>Humidity</th>
                    <th>Rainfall</th>
                    <th>Date</th>
                    <th>Recommendation</th>
                </tr>

                </thead>

                <!-- Filled dynamically from history.js -->
                <tbody id="historyBody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- Recommendation Modal -->
<div id="recommendationModal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeModal()">&times;</span>

        <h2>🌾 AI Crop Recommendation</h2>

        <hr style="margin:15px 0;">

        <div id="recommendationText"></div>

        <div style="text-align:center; margin-top:25px;">

            <button
                    id="downloadBtn"
                    data-id=""
                    onclick="downloadPdf(this.dataset.id)"
                    style="
                        background:#22c55e;
                        color:white;
                        border:none;
                        padding:12px 24px;
                        border-radius:10px;
                        cursor:pointer;
                        font-size:16px;
                        transition:0.3s;
                    "
                    onmouseover="this.style.background='#16a34a'"
                    onmouseout="this.style.background='#22c55e'">

                📄 Download PDF

            </button>

        </div>

    </div>

</div>

<script src="/js/history.js"></script>

</body>
</html>
